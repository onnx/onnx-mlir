# SPDX-License-Identifier: Apache-2.0

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
[project]
name = "OMPyCompile"
version = "1.0.0"
authors = [
  { name="Tong Chen", email="chentong@us.ibm.com" },
  { name="Alexandre Eichenberger", email="alexe@us.ibm.com" },
]
description = "Python driver to compile an onnx model compiled with standalone onnx-mlir compiler"
readme = "README.md"
requires-python = ">=3.9"
license = "Apache-2.0"
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: POSIX :: Linux",
]

dependencies = [
    "numpy"
]

[project.urls]
Homepage = "https://github.com/onnx/onnx-mlir"
Issues = "https://github.com/onnx/onnx-mlir/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/OMPyCompile"]

[tool.hatch.build]
include = [
  "src/OMPyCompile/lib/*"
  "src/OMPyCompile/bin/*"
]


