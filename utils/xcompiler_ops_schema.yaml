
# ==============================================================================
# FusedEltwise:  Element-wise operation with optional activation fusion
# ==============================================================================
- name: FusedEltwise
  domain: com.amd.xcompiler
  since_version: 1
  support_level: COMMON
  description: 'Quantized element-wise operation supporting arithmetic, trigonometric, activation, and comparision elementwise functions. Few eltwise ops support fusion with an optional activation.  Attributes: op_type specifies the element-wise operation (ADD, MUL, SUB, DIV, TANH, SQRT, etc); nonlinear specifies optional activation (NONE, RELU, LEAKYRELU); qscales contains [a_scale, b_scale, y_scale] quantization scales; qzeropoints contains [a_zp, b_zp, y_zp] quantization zero points; leakyrelu_alpha is the original LeakyReLU alpha; prelu_in is the fixed-point multiplier M for LeakyReLU (M/2^N); prelu_shift is the fixed-point shift N for LeakyReLU.'
  meta_attributes:
  - onnx_opset: 1
  - verify: True
  - fold: False
  inputs:
  - name: A
    description: First input tensor
    type_str: T
  - name: B
    description: Second input tensor
    type_str: T_or_None
  outputs:
  - name: Y
    description: Output tensor
    type_str: T
  attributes:
  - name: type
    description: Element-wise operation type (ADD, MUL, SUB, DIV, etc.)
    type: string
    required: true
  - name: nonlinear
    description: Fused activation type (NONE, RELU, PRELU, LEAKYRELU)
    type: string
    default_value: NONE
  - name: leakyrelu_alpha
    description: Original LeakyReLU alpha value (float)
    type: float
  - name: prelu_in
    description: Fixed-point multiplier M for LeakyReLU (M/2^N)
    type: int
  - name: prelu_shift
    description: Fixed-point shift N for LeakyReLU
    type: int
  type_constraints:
  - type_param: T
    description: Constrain input and output types to all numeric tensor types.
    allowed_types:
    - tensor(uint8)
    - tensor(uint16)
    - tensor(int8)
    - tensor(int16)
    - tensor(quant_QuantizedType)
  - type_param: T_or_None
    description: Constrain to all types in T plus NoneType.
    allowed_types:
    - tensor(uint8)
    - tensor(uint16)
    - tensor(int8)
    - tensor(int16)
    - tensor(quant_QuantizedType)
    - NoneType
  min_input: 2
  max_input: 2
  min_output: 1
  max_output: 1