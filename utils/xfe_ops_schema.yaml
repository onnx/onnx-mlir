# ==============================================================================
# MatMulBias: Matrix multiplication with optional bias addition (A * B + C)
# ==============================================================================
- name: MatMulBias
  domain: com.amd.xfe
  since_version: 1
  support_level: COMMON
  description: 'Matrix multiplication with bias addition. Computes Y = A * B + C in a fused operation for improved performance.'
  meta_attributes:
  - onnx_opset: 13
  - verify: True
  - fold: False
  inputs:
  - name: A
    description: N-dimensional matrix A
    type_str: T
  - name: B
    description: N-dimensional matrix B
    type_str: T
  - name: C
    description: 1D bias tensor
    type_str: T
  outputs:
  - name: Y
    description: Matrix multiply results from A * B + C
    type_str: T
  type_constraints:
  - type_param: T
    description: Constrain input and output types to float/int tensors.
    allowed_types:
    - tensor(float16)
    - tensor(float)
    - tensor(double)
    - tensor(uint32)
    - tensor(uint64)
    - tensor(int32)
    - tensor(int64)
    - tensor(bfloat16)
  min_input: 3
  max_input: 3
  min_output: 1
  max_output: 1

# ==============================================================================
# Conv: N-D Convolution with channel-last data layout
# ==============================================================================
- name: Conv
  domain: com.amd.xfe
  since_version: 1
  support_level: COMMON
  description: 'Convolution operator with channel-last layout (channels innermost). Similar to ONNX Conv but expects input/output tensors in channel-last format instead of NCHW.'
  meta_attributes:
  - onnx_opset: 11
  - verify: True
  - fold: False
  inputs:
  - name: X
    description: Input data tensor with channel-last layout (batch, spatial_dims..., channels)
    type_str: T
  - name: W
    description: Weight tensor with filter layout (spatial_dims..., input_channels/group, output_channels)
    type_str: T
  - name: B
    description: Optional 1D bias tensor
    type_str: T
  outputs:
  - name: Y
    description: Output data tensor with channel-last layout
    type_str: T
  attributes:
  - name: auto_pad
    description: Auto padding strategy (NOTSET, SAME_UPPER, SAME_LOWER, VALID)
    type: string
    default_value: NOTSET
  - name: dilations
    description: Dilation value along each spatial axis
    type: list(int)
  - name: group
    description: Number of groups for grouped convolution
    type: int
    default_value: 1
  - name: kernel_shape
    description: Shape of the convolution kernel
    type: list(int)
  - name: pads
    description: Padding for the beginning and ending along each spatial axis
    type: list(int)
  - name: strides
    description: Stride along each spatial axis
    type: list(int)
  type_constraints:
  - type_param: T
    description: Constrain input and output types to float tensors.
    allowed_types:
    - tensor(float16)
    - tensor(float)
    - tensor(double)
    - tensor(bfloat16)
  min_input: 2
  max_input: 3
  min_output: 1
  max_output: 1

# ==============================================================================
# AveragePool: Average pooling with channel-last data layout
# ==============================================================================
- name: AveragePool
  domain: com.amd.xfe
  since_version: 1
  support_level: COMMON
  description: 'AveragePool with channel-last layout (channels innermost). Applies average pooling with input/output tensors in channel-last format. Equivalent to AveragePool with kernel size equal to the spatial dimensions. Supports N-D input tensors.'
  meta_attributes:
  - onnx_opset: 11
  - verify: True
  - fold: False
  inputs:
  - name: X
    description: Input data tensor with channel-last layout (batch, spatial_dims..., channels)
    type_str: T
  outputs:
  - name: Y
    description: Output data tensor with channel-last layout
    type_str: T
  attributes:
  - name: auto_pad
    description: Auto padding strategy (NOTSET, SAME_UPPER, SAME_LOWER, VALID)
    type: string
    default_value: NOTSET
  - name: ceil_mode
    description: Whether to use ceil or floor to compute output shape
    type: int
    default_value: 0
  - name: count_include_pad
    description: Whether include pad pixels when calculating values for the edges
    type: int
    default_value: 0
  - name: kernel_shape
    description: Shape of the pooling kernel
    type: list(int)
  - name: pads
    description: Padding for the beginning and ending along each spatial axis
    type: list(int)
  - name: strides
    description: Stride along each spatial axis
    type: list(int)
  type_constraints:
  - type_param: T
    description: Constrain input and output types to float tensors.
    allowed_types:
    - tensor(float16)
    - tensor(float)
    - tensor(double)
    - tensor(bfloat16)
  min_input: 1
  max_input: 1
  min_output: 1
  max_output: 1

