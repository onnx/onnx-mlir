# ==============================================================================
# BatchNormalization: Batch normalization with channel-last (NHWC) layout
# Normalizes along the channel (last) dimension: y = scale * (x - mean) / sqrt(var + epsilon) + B
# ==============================================================================
- name: BatchNormalization
  domain: com.amd.xfe
  since_version: 1
  support_level: COMMON
  description: 'Batch normalization with channel-last layout (channels innermost). Carries out batch normalization with input/output tensors in channel-last format instead of NCHW. Uses pre-computed mean and variance for inference mode.'
  meta_attributes:
  - onnx_opset: 15
  - verify: True
  - fold: False
  inputs:
  - name: X
    description: Input data tensor with channel-last layout (batch, spatial_dims..., channels)
    type_str: T
  - name: scale
    description: 1D scale tensor of size C (number of channels)
    type_str: T
  - name: B
    description: 1D bias tensor of size C (number of channels)
    type_str: T
  - name: input_mean
    description: 1D running mean tensor of size C
    type_str: U
  - name: input_var
    description: 1D running variance tensor of size C
    type_str: U
  outputs:
  - name: Y
    description: Output data tensor with channel-last layout, same shape as input
    type_str: T
  attributes:
  - name: epsilon
    description: Small value to add to variance to avoid division by zero
    type: float
    default_value: 1e-05
  - name: momentum
    description: Factor used in computing the running mean and variance (unused in inference)
    type: float
    default_value: 0.9
  type_constraints:
  - type_param: T
    description: Constrain input and output types to float tensors.
    allowed_types:
    - tensor(float16)
    - tensor(float)
    - tensor(double)
    - tensor(bfloat16)
    - tensor(int8)
    - tensor(uint8)
  - type_param: U
    description: Constrain mean and var types to float tensors.
    allowed_types:
    - tensor(float16)
    - tensor(float)
    - tensor(double)
    - tensor(bfloat16)
  min_input: 5
  max_input: 5
  min_output: 1
  max_output: 1

# ==============================================================================
# InstanceNormalization: Instance normalization with channel-last (NHWC) layout
# Normalizes per instance per channel: y = scale * (x - mean) / sqrt(variance + epsilon) + B
# ==============================================================================
- name: InstanceNormalization
  domain: com.amd.xfe
  since_version: 1
  support_level: COMMON
  description: 'Instance normalization with channel-last layout (channels innermost). Carries out instance normalization with input/output tensors in channel-last format instead of NCHW. Formula: y = scale * (x - mean) / sqrt(variance + epsilon) + B, where mean and variance are computed per instance per channel.'
  meta_attributes:
  - onnx_opset: 6
  - verify: True
  - fold: False
  inputs:
  - name: input
    description: Input data tensor with channel-last layout (batch, height, width, channels)
    type_str: T
  - name: scale
    description: 1D scale tensor of size C (number of channels)
    type_str: T
  - name: B
    description: 1D bias tensor of size C (number of channels)
    type_str: T
  outputs:
  - name: output
    description: Output data tensor with channel-last layout, same shape as input
    type_str: T
  attributes:
  - name: epsilon
    description: Small value to add to variance to avoid division by zero
    type: float
    default_value: 1e-05
  type_constraints:
  - type_param: T
    description: Constrain input and output types to float tensors.
    allowed_types:
    - tensor(float16)
    - tensor(float)
    - tensor(double)
    - tensor(bfloat16)
    - tensor(int8)
    - tensor(uint8)
  min_input: 3
  max_input: 3
  min_output: 1
  max_output: 1

# ==============================================================================
# DepthToSpace: Rearrange data from channels to spatial dimensions with channel-last layout
# Inverse of SpaceToDepth - increases spatial size, decreases channel depth
# ==============================================================================
- name: DepthToSpace
  domain: com.amd.xfe
  since_version: 1
  support_level: COMMON
  description: 'DepthToSpace with channel-last layout (channels innermost). Rearranges data from the channel dimension into blocks of spatial data with input/output tensors in channel-last format instead of NCHW. This is the reverse transformation of SpaceToDepth.'
  meta_attributes:
  - onnx_opset: 11
  - verify: True
  - fold: False
  inputs:
  - name: input
    description: Input data tensor with channel-last layout (batch, height, width, channels)
    type_str: T
  outputs:
  - name: output
    description: Output data tensor with channel-last layout (batch, height*blocksize, width*blocksize, channels/(blocksize^2))
    type_str: T
  attributes:
  - name: blocksize
    description: Size of the blocks to be moved. Output spatial dimensions are multiplied by this factor
    type: int
  - name: mode
    description: Rearrangement mode - DCR (depth-column-row) or CRD (column-row-depth)
    type: string
    default_value: DCR
  type_constraints:
  - type_param: T
    description: Constrain input and output types to all tensor types.
    allowed_types:
    - tensor(uint8)
    - tensor(uint16)
    - tensor(uint32)
    - tensor(uint64)
    - tensor(int8)
    - tensor(int16)
    - tensor(int32)
    - tensor(int64)
    - tensor(float16)
    - tensor(float)
    - tensor(double)
    - tensor(bfloat16)
  min_input: 1
  max_input: 1
  min_output: 1
  max_output: 1

# ==============================================================================
# SpaceToDepth: Rearrange spatial data to channels with channel-last layout
# Inverse of DepthToSpace - decreases spatial size, increases channel depth
# ==============================================================================
- name: SpaceToDepth
  domain: com.amd.xfe
  since_version: 1
  support_level: COMMON
  description: 'SpaceToDepth with channel-last layout (channels innermost). Rearranges blocks of spatial data into the channel dimension with input/output tensors in channel-last format instead of NCHW. This is the reverse transformation of DepthToSpace.'
  meta_attributes:
  - onnx_opset: 1
  - verify: True
  - fold: False
  inputs:
  - name: input
    description: Input data tensor with channel-last layout (batch, height, width, channels)
    type_str: T
  outputs:
  - name: output
    description: Output data tensor with channel-last layout (batch, height/blocksize, width/blocksize, channels*(blocksize^2))
    type_str: T
  attributes:
  - name: blocksize
    description: Size of the blocks to be moved. Input spatial dimensions are divided by this factor
    type: int
  type_constraints:
  - type_param: T
    description: Constrain input and output types to all tensor types.
    allowed_types:
    - tensor(uint8)
    - tensor(uint16)
    - tensor(uint32)
    - tensor(uint64)
    - tensor(int8)
    - tensor(int16)
    - tensor(int32)
    - tensor(int64)
    - tensor(float16)
    - tensor(float)
    - tensor(double)
    - tensor(bfloat16)
  min_input: 1
  max_input: 1
  min_output: 1
  max_output: 1

# ==============================================================================
# Resize: Resize tensor with channel-last layout
# Supports nearest, linear, and cubic interpolation modes
# ==============================================================================
- name: Resize
  domain: com.amd.xfe
  since_version: 1
  support_level: COMMON
  description: 'Resize with channel-last layout (channels innermost). Resizes input tensor with input/output tensors in channel-last format (NHWC) instead of NCHW. Supports both scales and sizes for specifying output dimensions.'
  meta_attributes:
  - onnx_opset: 19
  - verify: True
  - fold: False
  inputs:
  - name: X
    description: Input data tensor with channel-last layout (batch, height, width, channels)
    type_str: T1
  - name: roi
    description: Region of interest for coordinate transformation (optional, use empty tensor if not needed)
    type_str: T2
    optional: True
  - name: scales
    description: Scale factors for each dimension (optional if sizes is provided)
    type_str: tensor(float)
    optional: True
  - name: sizes
    description: Output sizes for each dimension (optional if scales is provided)
    type_str: tensor(int64)
    optional: True
  outputs:
  - name: Y
    description: Output data tensor with channel-last layout, resized spatial dimensions
    type_str: T1
  attributes:
  - name: antialias
    description: Whether to apply antialiasing when downsampling
    type: int
    default_value: 0
  - name: axes
    description: Axes along which to resize (if not provided, resize all axes)
    type: list(int)
  - name: coordinate_transformation_mode
    description: How to transform coordinates (half_pixel, asymmetric, align_corners, etc.)
    type: string
    default_value: half_pixel
  - name: cubic_coeff_a
    description: Coefficient for cubic interpolation
    type: float
    default_value: -0.75
  - name: exclude_outside
    description: Whether to exclude values outside the image when computing interpolation
    type: int
    default_value: 0
  - name: extrapolation_value
    description: Value for extrapolation when coordinate is out of bounds
    type: float
    default_value: 0.0
  - name: keep_aspect_ratio_policy
    description: Policy for keeping aspect ratio (stretch, not_larger, not_smaller)
    type: string
    default_value: stretch
  - name: mode
    description: Interpolation mode (nearest, linear, cubic)
    type: string
    default_value: nearest
  - name: nearest_mode
    description: Rounding mode for nearest interpolation (round_prefer_floor, round_prefer_ceil, floor, ceil)
    type: string
    default_value: round_prefer_floor
  type_constraints:
  - type_param: T1
    description: Constrain input and output types to all tensor types.
    allowed_types:
    - tensor(uint8)
    - tensor(uint16)
    - tensor(uint32)
    - tensor(uint64)
    - tensor(int8)
    - tensor(int16)
    - tensor(int32)
    - tensor(int64)
    - tensor(bfloat16)
    - tensor(float16)
    - tensor(float)
    - tensor(double)
    - tensor(string)
    - tensor(bool)
    - tensor(complex64)
    - tensor(complex128)
  - type_param: T2
    description: Constrain roi type to float tensors.
    allowed_types:
    - tensor(float16)
    - tensor(float)
    - tensor(double)
  min_input: 4
  max_input: 4
  min_output: 1
  max_output: 1
