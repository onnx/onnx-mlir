# ==============================================================================
# InstanceNormalization: Instance normalization with channel-last (NHWC) layout
# Normalizes per instance per channel: y = scale * (x - mean) / sqrt(variance + epsilon) + B
# ==============================================================================
- name: InstanceNormalization
  domain: com.amd.xfe
  since_version: 1
  support_level: COMMON
  description: 'Instance normalization with channel-last layout (channels innermost). Carries out instance normalization with input/output tensors in channel-last format instead of NCHW. Formula: y = scale * (x - mean) / sqrt(variance + epsilon) + B, where mean and variance are computed per instance per channel.'
  meta_attributes:
  - onnx_opset: 6
  - verify: True
  - fold: False
  inputs:
  - name: input
    description: Input data tensor with channel-last layout (batch, height, width, channels)
    type_str: T
  - name: scale
    description: 1D scale tensor of size C (number of channels)
    type_str: T
  - name: B
    description: 1D bias tensor of size C (number of channels)
    type_str: T
  outputs:
  - name: output
    description: Output data tensor with channel-last layout, same shape as input
    type_str: T
  attributes:
  - name: epsilon
    description: Small value to add to variance to avoid division by zero
    type: float
    default_value: 1e-05
  type_constraints:
  - type_param: T
    description: Constrain input and output types to float tensors.
    allowed_types:
    - tensor(float16)
    - tensor(float)
    - tensor(double)
    - tensor(bfloat16)
  min_input: 3
  max_input: 3
  min_output: 1
  max_output: 1

# ==============================================================================
# DepthToSpace: Rearrange data from channels to spatial dimensions with channel-last layout
# Inverse of SpaceToDepth - increases spatial size, decreases channel depth
# ==============================================================================
- name: DepthToSpace
  domain: com.amd.xfe
  since_version: 1
  support_level: COMMON
  description: 'DepthToSpace with channel-last layout (channels innermost). Rearranges data from the channel dimension into blocks of spatial data with input/output tensors in channel-last format instead of NCHW. This is the reverse transformation of SpaceToDepth.'
  meta_attributes:
  - onnx_opset: 11
  - verify: True
  - fold: False
  inputs:
  - name: input
    description: Input data tensor with channel-last layout (batch, height, width, channels)
    type_str: T
  outputs:
  - name: output
    description: Output data tensor with channel-last layout (batch, height*blocksize, width*blocksize, channels/(blocksize^2))
    type_str: T
  attributes:
  - name: blocksize
    description: Size of the blocks to be moved. Output spatial dimensions are multiplied by this factor
    type: int
  - name: mode
    description: Rearrangement mode - DCR (depth-column-row) or CRD (column-row-depth)
    type: string
    default_value: DCR
  type_constraints:
  - type_param: T
    description: Constrain input and output types to all tensor types.
    allowed_types:
    - tensor(uint8)
    - tensor(uint16)
    - tensor(uint32)
    - tensor(uint64)
    - tensor(int8)
    - tensor(int16)
    - tensor(int32)
    - tensor(int64)
    - tensor(float16)
    - tensor(float)
    - tensor(double)
    - tensor(bfloat16)
  min_input: 1
  max_input: 1
  min_output: 1
  max_output: 1

# ==============================================================================
# SpaceToDepth: Rearrange spatial data to channels with channel-last layout
# Inverse of DepthToSpace - decreases spatial size, increases channel depth
# ==============================================================================
- name: SpaceToDepth
  domain: com.amd.xfe
  since_version: 1
  support_level: COMMON
  description: 'SpaceToDepth with channel-last layout (channels innermost). Rearranges blocks of spatial data into the channel dimension with input/output tensors in channel-last format instead of NCHW. This is the reverse transformation of DepthToSpace.'
  meta_attributes:
  - onnx_opset: 1
  - verify: True
  - fold: False
  inputs:
  - name: input
    description: Input data tensor with channel-last layout (batch, height, width, channels)
    type_str: T
  outputs:
  - name: output
    description: Output data tensor with channel-last layout (batch, height/blocksize, width/blocksize, channels*(blocksize^2))
    type_str: T
  attributes:
  - name: blocksize
    description: Size of the blocks to be moved. Input spatial dimensions are divided by this factor
    type: int
  type_constraints:
  - type_param: T
    description: Constrain input and output types to all tensor types.
    allowed_types:
    - tensor(uint8)
    - tensor(uint16)
    - tensor(uint32)
    - tensor(uint64)
    - tensor(int8)
    - tensor(int16)
    - tensor(int32)
    - tensor(int64)
    - tensor(float16)
    - tensor(float)
    - tensor(double)
    - tensor(bfloat16)
  min_input: 1
  max_input: 1
  min_output: 1
  max_output: 1
