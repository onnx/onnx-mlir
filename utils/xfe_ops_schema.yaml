# ==============================================================================
# GlobalAveragePool: Global average pooling with channel-last layout
# Pools across all spatial dimensions, reducing spatial dims to 1
# ==============================================================================
- name: GlobalAveragePool
  domain: com.amd.xfe
  since_version: 1
  support_level: COMMON
  description: 'GlobalAveragePool with channel-last layout (channels innermost). Applies average pooling across all spatial dimensions with input/output tensors in channel-last format. Equivalent to AveragePool with kernel size equal to the spatial dimensions. Supports N-D input tensors.'
  meta_attributes:
  - onnx_opset: 1
  - verify: True
  - fold: False
  inputs:
  - name: X
    description: Input data tensor with channel-last layout (batch, spatial_dims..., channels)
    type_str: T
  outputs:
  - name: Y
    description: Output data tensor with channel-last layout (batch, 1s..., channels) where all spatial dimensions are reduced to 1
    type_str: T
  type_constraints:
  - type_param: T
    description: Constrain input and output types to float tensors.
    allowed_types:
    - tensor(float16)
    - tensor(float)
    - tensor(double)
    - tensor(bfloat16)
  min_input: 1
  max_input: 1
  min_output: 1
  max_output: 1

